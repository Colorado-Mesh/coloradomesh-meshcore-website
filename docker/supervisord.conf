[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10
startsecs=1
stopsignal=TERM
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:next]
command=node /app/server.js
directory=/app
environment=NODE_ENV="production",HOSTNAME="127.0.0.1",PORT="3001"
autostart=true
autorestart=true
priority=20
startsecs=2
stopsignal=TERM
stopwaitsecs=20
user=nextjs
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:corescope-server]
command=/usr/local/bin/corescope-server -config-dir /app/corescope -db /app/corescope/data/meshcore.db -public /app/corescope/public -port 3002
directory=/app/corescope
environment=DB_PATH="/app/corescope/data/meshcore.db",CORESCOPE_INGESTOR_STATS="/app/corescope/data/ingestor-stats.json"
autostart=true
autorestart=true
priority=30
startsecs=2
stopsignal=TERM
stopwaitsecs=20
user=nextjs
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:corescope-ingestor]
command=/usr/local/bin/corescope-ingestor -config /app/corescope/config.json
directory=/app/corescope
environment=DB_PATH="/app/corescope/data/meshcore.db",CORESCOPE_INGESTOR_STATS="/app/corescope/data/ingestor-stats.json"
autostart=false
autorestart=true
priority=40
startsecs=2
startretries=10
stopsignal=TERM
stopwaitsecs=20
user=nextjs
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
