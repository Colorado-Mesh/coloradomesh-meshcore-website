worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  map $http_upgrade $corescope_ws_upgrade {
    default 0;
    ~*websocket 1;
  }

  upstream next_app {
    server 127.0.0.1:3001;
  }

  upstream corescope_app {
    server 127.0.0.1:3002;
  }

  server {
    listen 3000;
    listen [::]:3000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /map {
      proxy_pass http://corescope_app/;
    }

    location ^~ /map/ {
      proxy_pass http://corescope_app/;
    }

    location = /ws {
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 1h;
      proxy_send_timeout 1h;
      proxy_pass http://corescope_app;
    }

    location ^~ /api/map/ {
      proxy_pass http://next_app;
    }

    location ^~ /api/live-map/ {
      proxy_pass http://next_app;
    }

    location ^~ /api/config/ {
      proxy_pass http://corescope_app;
    }

    location ^~ /api/analytics/ {
      proxy_pass http://corescope_app;
    }

    location ^~ /api/audio-lab/ {
      proxy_pass http://corescope_app;
    }

    location ^~ /api/traces/ {
      proxy_pass http://corescope_app;
    }

    location = /api/admin/prune {
      proxy_pass http://corescope_app;
    }

    location ^~ /api/admin/ {
      return 404;
    }

    location ^~ /api/debug/ {
      proxy_pass http://corescope_app;
    }

    location ~ ^/api/(stats|nodes|packets|channels|observers|iata-coords|perf|spec|docs|health|healthz|decode|resolve-hops|dropped-packets|backup)(/|$) {
      proxy_pass http://corescope_app;
    }

    location ^~ /api/paths/ {
      proxy_pass http://corescope_app;
    }

    location ~ ^/(analytics|app|audio|audio-lab|audio-v1-constellation|bottom-nav|channel-color-picker|channel-colors|channel-decrypt|channel-qr|channels|compare|customize|customize-v2|denvermc-default-route|denvermc-leaflet-zoom|denvermc-shell|denvermc-sound|drag-manager|filter-ux|geo-filter-overlay|geofilter-draft|gesture-hints|hash-color|home|hop-display|hop-resolver|live|map|nav-drawer|node-analytics|nodes|observer-detail|observers|packet-filter|packet-helpers|packets|path-inspector|perf|region-filter|roles|style|table-sort|touch-gestures|traces|url-state)\.(js|css)$ {
      proxy_pass http://corescope_app;
    }

    location ^~ /sound/ {
      proxy_pass http://corescope_app;
    }

    location ~ ^/(favicon\.(ico|svg)|og-image\.png|geofilter-builder\.html|geofilter-docs\.html)$ {
      proxy_pass http://corescope_app;
    }

    location ^~ /vendor/ {
      proxy_pass http://corescope_app;
    }

    location = /fonts/aldrich-regular.woff2 {
      proxy_pass http://corescope_app;
    }

    location ~ ^/img/(corescope-hero\.svg|corescope-logo\.svg)$ {
      proxy_pass http://corescope_app;
    }

    location @corescope_root_ws {
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 1h;
      proxy_send_timeout 1h;
      proxy_pass http://corescope_app;
    }

    location / {
      error_page 418 = @corescope_root_ws;
      if ($corescope_ws_upgrade) {
        return 418;
      }
      proxy_pass http://next_app;
    }
  }
}
