# The site uses the public Colorado Mesh analyzer API by default.
# The optional live-map sidecar can be enabled with COMPOSE_PROFILES=live-map when MQTT subscriber credentials are available.
services:
  live-map:
    profiles:
      - live-map
    image: ${LIVE_MAP_IMAGE:-yellowcooln/meshcore-mqtt-live-map:latest}
    environment:
      PROD_MODE: ${LIVE_MAP_PROD_MODE:-false}
      PROD_TOKEN: ${MESHCORE_LIVE_MAP_API_TOKEN:-}
      MQTT_HOST: ${LIVE_MAP_MQTT_HOST:-mqtt.meshcore.coloradomesh.org}
      MQTT_PORT: ${LIVE_MAP_MQTT_PORT:-1883}
      MQTT_USERNAME: ${LIVE_MAP_MQTT_USERNAME:-}
      MQTT_PASSWORD: ${LIVE_MAP_MQTT_PASSWORD:-}
      MQTT_TRANSPORT: ${LIVE_MAP_MQTT_TRANSPORT:-websockets}
      MQTT_WS_PATH: ${LIVE_MAP_MQTT_WS_PATH:-/ws}
      MQTT_TLS: ${LIVE_MAP_MQTT_TLS:-true}
      MQTT_TOPIC: ${LIVE_MAP_MQTT_TOPIC:-meshcore/#}
      ROUTE_INFRA_ONLY: ${LIVE_MAP_ROUTE_INFRA_ONLY:-true}
      COVERAGE_API_URL: ${LIVE_MAP_COVERAGE_API_URL:-}
      COVERAGE_API_KEY: ${LIVE_MAP_COVERAGE_API_KEY:-}
      WEATHER_RADAR_ENABLED: ${LIVE_MAP_WEATHER_RADAR_ENABLED:-true}
      WEATHER_RADAR_COUNTRY_BOUNDS_ENABLED: ${LIVE_MAP_WEATHER_RADAR_COUNTRY_BOUNDS_ENABLED:-false}
    volumes:
      - live-map-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-colorado-meshcore-site}:local
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      MESHCORE_MAP_TILE_URL: ${MESHCORE_MAP_TILE_URL:-https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png}
      MESHCORE_MAP_TILE_ATTRIBUTION: '${MESHCORE_MAP_TILE_ATTRIBUTION:-&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors}'
      MESHCORE_MAP_DEFAULT_LATITUDE: ${MESHCORE_MAP_DEFAULT_LATITUDE:-39.5501}
      MESHCORE_MAP_DEFAULT_LONGITUDE: ${MESHCORE_MAP_DEFAULT_LONGITUDE:--105.7821}
      MESHCORE_MAP_DEFAULT_ZOOM: ${MESHCORE_MAP_DEFAULT_ZOOM:-7}
      MESHCORE_MAP_SAMPLE_DATA: ${MESHCORE_MAP_SAMPLE_DATA:-false}
      MESHCORE_MAP_DEMO_MODE: ${MESHCORE_MAP_DEMO_MODE:-false}
      MESHCORE_MAP_HISTORY_ENABLED: ${MESHCORE_MAP_HISTORY_ENABLED:-false}
      MESHCORE_LIVE_MAP_API_URL: ${MESHCORE_LIVE_MAP_API_URL:-https://analyzer.meshcore.coloradomesh.org/api/nodes}
      MESHCORE_LIVE_MAP_API_TOKEN: ${MESHCORE_LIVE_MAP_API_TOKEN:-}
      MESHCORE_LIVE_MAP_ALLOW_PRIVATE_URLS: ${MESHCORE_LIVE_MAP_ALLOW_PRIVATE_URLS:-false}
      MESHCORE_LIVE_MAP_PUBLIC_TOKEN_PROXY_ENABLED: ${MESHCORE_LIVE_MAP_PUBLIC_TOKEN_PROXY_ENABLED:-false}
      MESHCORE_LIVE_MAP_API_REFRESH_SECONDS: ${MESHCORE_LIVE_MAP_API_REFRESH_SECONDS:-30}
      MESHCORE_LIVE_MAP_PROXY_TIMEOUT_MS: ${MESHCORE_LIVE_MAP_PROXY_TIMEOUT_MS:-8000}
      MESHCORE_LIVE_MAP_PROXY_MAX_RESPONSE_BYTES: ${MESHCORE_LIVE_MAP_PROXY_MAX_RESPONSE_BYTES:-2000000}
      MESHCORE_MQTT_URL: ${MESHCORE_MQTT_URL:-}
      MESHCORE_MQTT_USERNAME: ${MESHCORE_MQTT_USERNAME:-}
      MESHCORE_MQTT_PASSWORD: ${MESHCORE_MQTT_PASSWORD:-}
      MESHCORE_MQTT_TOPIC: ${MESHCORE_MQTT_TOPIC:-meshcore/#}
      MESHCORE_MQTT_CLIENT_ID: ${MESHCORE_MQTT_CLIENT_ID:-colorado-meshcore-site}
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/api/map/stats').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  live-map-data:
