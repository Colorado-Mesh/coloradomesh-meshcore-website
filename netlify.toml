# Legacy Netlify configuration for Colorado MeshCore.
# Docker is the primary runtime; keep this file only for secondary Netlify previews.

[build]
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "24"
  NPM_VERSION = "10"
  NPM_FLAGS = "--prefer-offline=false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://*.letsmesh.net https://*.mapbox.com https://*.supabase.co wss://*.supabase.co https://*.basemaps.cartocdn.com https://*.carto.com; frame-ancestors 'none';"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[context.deploy-preview]
  command = "rm -rf .next && npm ci && npm run build"
  [context.deploy-preview.environment]
    NODE_ENV = "production"

[context.branch-deploy]
  command = "rm -rf .next && npm ci && npm run build"
  [context.branch-deploy.environment]
    NODE_ENV = "production"

[context.production]
  command = "rm -rf .next && npm ci && npm run build"
  [context.production.environment]
    NODE_ENV = "production"

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

# Let Next.js handle all other routing and 404s.
